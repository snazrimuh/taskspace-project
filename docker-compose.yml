services:
  postgres:
    image: postgres:16-alpine
    container_name: taskspace-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskspace
      POSTGRES_PASSWORD: taskspace_secret
      POSTGRES_DB: taskspace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskspace-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://taskspace:taskspace_secret@postgres:5432/taskspace?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-taskspace_access_secret_change_in_prod}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-taskspace_refresh_secret_change_in_prod}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-"Team Flow <no-reply@teamflow.app>"}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
